<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Source Sans Pro", Arial, sans-serif;
      }

      body {
        margin: 0;
        color: rgb(49, 51, 63);
        background: transparent;
      }

      .panel {
        border: 1px solid rgba(49, 51, 63, 0.18);
        border-radius: 8px;
        padding: 16px;
        background: rgb(255, 255, 255);
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input[type="file"] {
        width: 100%;
        box-sizing: border-box;
      }

      video {
        display: block;
        width: 100%;
        max-height: 360px;
        margin-top: 14px;
        border-radius: 6px;
        background: #111827;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 9px 14px;
        color: white;
        background: rgb(255, 75, 75);
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        font-size: 14px;
        color: rgba(49, 51, 63, 0.76);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <label for="videoInput">Upload an MP4 video</label>
      <input id="videoInput" type="file" accept="video/mp4,video/*" />
      <video id="video" controls muted playsinline></video>
      <div class="row">
        <button id="extractButton" disabled>Extract frames</button>
        <span id="status" class="status">Choose a video to begin.</span>
      </div>
    </div>

    <canvas id="canvas" hidden></canvas>

    <script>
      let args = { intervalSeconds: 3, maxFrames: 8 };
      let objectUrl = null;

      const input = document.getElementById("videoInput");
      const video = document.getElementById("video");
      const button = document.getElementById("extractButton");
      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("canvas");
      const context = canvas.getContext("2d");

      function postMessage(type, payload) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type,
            ...payload,
          },
          "*"
        );
      }

      function setHeight() {
        postMessage("streamlit:setFrameHeight", {
          height: Math.ceil(document.documentElement.scrollHeight),
        });
      }

      function setValue(value) {
        postMessage("streamlit:setComponentValue", { value });
      }

      function setStatus(message) {
        statusEl.textContent = message;
        setHeight();
      }

      function waitForEvent(target, eventName) {
        return new Promise((resolve, reject) => {
          const onEvent = () => {
            cleanup();
            resolve();
          };
          const onError = () => {
            cleanup();
            reject(new Error("Could not read this video."));
          };
          const cleanup = () => {
            target.removeEventListener(eventName, onEvent);
            target.removeEventListener("error", onError);
          };
          target.addEventListener(eventName, onEvent, { once: true });
          target.addEventListener("error", onError, { once: true });
        });
      }

      async function seekTo(timestamp) {
        video.currentTime = Math.min(timestamp, Math.max(video.duration - 0.05, 0));
        await waitForEvent(video, "seeked");
      }

      function drawFrame(timestamp) {
        const maxWidth = 640;
        const scale = Math.min(1, maxWidth / video.videoWidth);
        canvas.width = Math.max(1, Math.round(video.videoWidth * scale));
        canvas.height = Math.max(1, Math.round(video.videoHeight * scale));
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        return {
          timestamp,
          dataUrl: canvas.toDataURL("image/jpeg", 0.78),
        };
      }

      async function extractFrames() {
        if (!video.duration || Number.isNaN(video.duration)) {
          setStatus("The video metadata is not ready yet.");
          return;
        }

        button.disabled = true;
        const interval = Number(args.intervalSeconds || 3);
        const maxFrames = Number(args.maxFrames || 8);
        const frames = [];

        try {
          for (let timestamp = 0; timestamp < video.duration && frames.length < maxFrames; timestamp += interval) {
            setStatus(`Extracting frame ${frames.length + 1}...`);
            await seekTo(timestamp);
            frames.push(drawFrame(timestamp));
          }

          setStatus(`Extracted ${frames.length} frame${frames.length === 1 ? "" : "s"}.`);
          setValue({
            name: input.files[0]?.name || "video",
            duration: video.duration,
            frames,
          });
        } catch (error) {
          setStatus(error.message || "Frame extraction failed.");
        } finally {
          button.disabled = false;
        }
      }

      input.addEventListener("change", async () => {
        setValue(null);
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
        }

        const file = input.files[0];
        if (!file) {
          video.removeAttribute("src");
          button.disabled = true;
          setStatus("Choose a video to begin.");
          return;
        }

        objectUrl = URL.createObjectURL(file);
        video.src = objectUrl;
        button.disabled = true;
        setStatus("Loading video metadata...");
        try {
          await waitForEvent(video, "loadedmetadata");
          button.disabled = false;
          setStatus(`Ready: ${file.name} (${video.duration.toFixed(1)}s).`);
        } catch (error) {
          setStatus(error.message || "Could not load this video.");
        }
      });

      button.addEventListener("click", extractFrames);

      window.addEventListener("message", (event) => {
        if (event.data.type !== "streamlit:render") {
          return;
        }
        args = event.data.args || args;
        setHeight();
      });

      postMessage("streamlit:componentReady", { apiVersion: 1 });
      setHeight();
    </script>
  </body>
</html>
